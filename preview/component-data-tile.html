<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Data tile</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-app); }
  .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
  .header .t { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-tertiary); }
  .header .s { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .tile { background: var(--bg-card); border: 1px solid var(--ln-divider); border-radius: var(--r-md); padding: 16px; display: flex; flex-direction: column; gap: 10px; min-height: 130px; }
  .tile.hover { background: var(--bg-card-hover); }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-tertiary); }
  .val { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 28px; font-weight: 500; color: var(--fg-primary); line-height: 1; letter-spacing: -0.01em; }
  .delta { display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 12px; }
  .delta.up { color: var(--signal-up); }
  .delta.dn { color: var(--signal-down); }
  .foot { display: flex; justify-content: space-between; align-items: end; font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
  .spark { display: flex; align-items: end; gap: 2px; height: 18px; }
  .spark span { width: 3px; background: var(--graphite-600); border-radius: 1px; }
  .spark span.acc { background: var(--amber-300); }
</style>
</head>
<body>
  <div class="header">
    <div class="t">Data tile · KPI primitive</div>
    <div class="s">label · value · Δ · sparkline</div>
  </div>
  <div class="grid">
    <div class="tile">
      <div class="lbl">Marže Q2</div>
      <div class="val">12,4 %</div>
      <div class="delta dn">▼ −1,8 p.b. <span style="color:var(--fg-muted); margin-left:4px">Q/Q</span></div>
      <div class="foot">
        <div class="spark">
          <span style="height:6px"></span><span style="height:9px"></span><span style="height:13px"></span>
          <span style="height:11px"></span><span style="height:14px"></span><span style="height:10px"></span>
          <span style="height:8px"></span><span class="acc" style="height:6px"></span>
        </div>
        <span>8q</span>
      </div>
    </div>
    <div class="tile hover">
      <div class="lbl">Sledované entity</div>
      <div class="val">147</div>
      <div class="delta up">▲ +12 <span style="color:var(--fg-muted); margin-left:4px">měsíc</span></div>
      <div class="foot"><span>Watch List</span><span>14. 5.</span></div>
    </div>
    <div class="tile">
      <div class="lbl">Aktivní alerty</div>
      <div class="val" style="color: var(--signal-down)">3</div>
      <div class="delta dn">▲ 2 nové · 1 nepřečtená</div>
      <div class="foot"><span>posl. 24 h</span><span>14:32</span></div>
    </div>
  </div>
</body>
</html>
