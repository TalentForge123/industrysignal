<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IndustrySignal · Design Directions · SRSC</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=GT+Sectra:wght@400;500&family=JetBrains+Mono:wght@400;500;600&display=swap');
    body { background: var(--bg-app); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="srsc-variants.jsx"></script>

  <script type="text/babel">
    const ROWS = [
      { tk: 'EMVY', name: 'EnergoMontáže Východ s.r.o.',  seg: 'Elektromontáže', exp: 247, score: 84 },
      { tk: 'NKTC', name: 'NKT Cables CZ a.s.',            seg: 'Kabeláž',       exp: 124, score: 76 },
      { tk: 'CBLT', name: 'Cabletec Industrial a.s.',      seg: 'Kabeláž',       exp:  88, score: 72, network: true },
      { tk: 'OEZL', name: 'OEZ Letohrad s.r.o.',           seg: 'Komponenty',    exp:  95, score: 58 },
      { tk: 'EMTL', name: 'Energometal a.s.',              seg: 'Hutnictví',     exp:  73, score: 54 },
      { tk: 'ABBT', name: 'ABB Třebíč s.r.o.',             seg: 'Trafostanice',  exp: 312, score: 42 },
    ];

    function App() {
      return (
        <DesignCanvas title="SRSC · Design Directions" subtitle="Tři vizuální směry pro IndustrySignal portál — stejná data, jiná identita">
          <DCSection id="dirs" title="Comparison" subtitle="Vlevo = nynější Bloomberg terminál · vpravo dvě alternativy">
            <DCArtboard id="a" label="A · Bloomberg terminal (current)" width={760} height={640}>
              <VariantTerminal rows={ROWS} />
            </DCArtboard>
            <DCArtboard id="b" label="B · Editorial · Economist-like" width={760} height={640}>
              <VariantEditorial rows={ROWS} />
            </DCArtboard>
            <DCArtboard id="c" label="C · Modern SaaS · Linear-like" width={760} height={640}>
              <VariantModern rows={ROWS} />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
