<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Display & headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-app); }
  .row { display: grid; grid-template-columns: 96px 1fr; gap: 18px 16px; align-items: baseline; }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-muted); padding-top: 10px; }
  .display { font-family: var(--font-sans); font-weight: 300; letter-spacing: -0.02em; line-height: 1.05; color: var(--fg-primary); font-size: 44px; }
  .h1 { font-size: 32px; font-weight: 500; letter-spacing: -0.01em; line-height: 1.1; color: var(--fg-primary); }
  .h2 { font-size: 24px; font-weight: 500; line-height: 1.25; color: var(--fg-primary); }
  .h3 { font-size: 18px; font-weight: 600; line-height: 1.3; color: var(--fg-primary); }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">Display · 44 / 300</div>
    <div class="display">Q2 2026 · Strojírenství</div>
    <div class="meta">H1 · 32 / 500</div>
    <div class="h1">Marže klesly o 1,8 p.b.</div>
    <div class="meta">H2 · 24 / 500</div>
    <div class="h2">Energetická náročnost ve východních regionech</div>
    <div class="meta">H3 · 18 / 600</div>
    <div class="h3">Indikace tlaku na druhostupňové dodavatele</div>
  </div>
</body>
</html>
